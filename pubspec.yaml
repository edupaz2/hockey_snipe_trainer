name: hockey_snipe_trainer
description: Hockey training app with BLE-enabled light-up targets for interactive shooting drills.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # BLE
  flutter_blue_plus: ^1.31.13
  
  # Permissions
  permission_handler: ^11.1.0
  
  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Audio
  audioplayers: ^5.2.1
  
  # Animations
  lottie: ^2.7.0
  flutter_animate: ^4.3.0
  
  # UI Helpers
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  gap: ^3.0.1
  
  # Utils
  uuid: ^4.2.2
  collection: ^1.18.0
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  
  # Uncomment these when you add your assets:
  # assets:
  #   - assets/sounds/
  #   - assets/animations/
  #   - assets/images/
  
  # Custom fonts are optional - google_fonts package is used as fallback
  # fonts:
  #   - family: Orbitron
  #     fonts:
  #       - asset: assets/fonts/Orbitron-Regular.ttf
  #       - asset: assets/fonts/Orbitron-Bold.ttf
  #         weight: 700
